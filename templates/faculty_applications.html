{% extends "base.html" %}

{% block title %}
    Applications - Skill Gap Radar
{% endblock %}

{% block content %}
<div class="dashboard">
    <div class="header">
        <h1 style="font-family: 'Syne', sans-serif; font-size: 2.8rem; letter-spacing: -2px; margin-bottom: 8px;">
            Project Applications
        </h1>
        <p class="text-muted" style="max-width: 600px; font-size: 1.1rem;">
            Review and manage student applications sorted by match score.
        </p>
    </div>

    <div class="glass-card">
        <div class="flex justify-between items-center mb-4">
            <h3 id="project-title">Loading...</h3>
            <a href="/faculty/dashboard" class="glass-btn">Back to Projects</a>
        </div>
        
        <div id="applications-table-container">
            <p class="text-muted">Loading applications...</p>
        </div>
    </div>
</div>

<script>
    const projectId = "{{ project_id }}";
    
    document.addEventListener('DOMContentLoaded', () => {
        loadApplications();
    });

    async function loadApplications() {
        const res = await fetch(`/faculty/applications/${projectId}`);
        const applications = await res.json();
        const container = document.getElementById('applications-table-container');
        
        if (applications.error) {
            container.innerHTML = `<p class="text-error" style="color: #f87171;">${applications.error}</p>`;
            return;
        }
        
        if (!applications || applications.length === 0) {
            container.innerHTML = '<p class="text-muted">No applications yet.</p>';
            return;
        }
        
        // Update project title from first application
        if (applications.length > 0) {
            document.getElementById('project-title').textContent = `Applications for Project #${projectId}`;
        }
        
        container.innerHTML = `
            <div class="applications-table-wrapper" style="overflow-x: auto;">
                <table class="applications-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                            <th style="text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Rank</th>
                            <th style="text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Student</th>
                            <th style="text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Match</th>
                            <th style="text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Reason</th>
                            <th style="text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Skills Match</th>
                            <th style="text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Project Idea</th>
                            <th style="text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Applied</th>
                            <th style="text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Status</th>
                            <th style="text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${applications.map((app, index) => `
                            <tr id="app-row-${app.application_id}" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <td style="padding: 16px 12px; font-weight: bold; color: ${index < 3 ? '#4ade80' : 'var(--text-muted)'};">#${index + 1}</td>
                                <td style="padding: 16px 12px; font-weight: 600;">${escapeHtml(app.student_name)}</td>
                                <td style="padding: 16px 12px;">
                                    <span style="font-size: 1.2rem; font-weight: bold; color: ${app.match_score >= 70 ? '#4ade80' : app.match_score >= 40 ? '#fbbf24' : '#f87171'};">${app.match_score}%</span>
                                </td>
                                <td style="padding: 16px 12px; max-width: 200px;">
                                    <span style="font-style: italic; font-size: 0.85rem; color: var(--text-muted);">${escapeHtml(app.match_reason)}</span>
                                </td>
                                <td style="padding: 16px 12px;">
                                    ${app.matched_skills.length > 0 ? app.matched_skills.map(s => `<span class="skill-badge matched">${escapeHtml(s)}</span>`).join('') : '<span class="text-muted" style="font-size: 0.8rem;">None</span>'}
                                </td>
                                <td style="padding: 16px 12px; max-width: 200px;">
                                    <span style="font-size: 0.85rem; color: var(--text-muted);">${escapeHtml(app.project_idea || 'N/A')}</span>
                                </td>
                                <td style="padding: 16px 12px; font-size: 0.8rem; color: var(--text-muted);">${new Date(app.applied_at).toLocaleDateString()}</td>
                                <td id="status-${app.application_id}" style="padding: 16px 12px;">
                                    <span class="status-badge ${app.status}">${app.status}</span>
                                </td>
                                <td style="padding: 16px 12px;">
                                    ${app.status === 'pending' ? `
                                        <div class="flex gap-2">
                                            <button class="glass-btn glass-btn-primary" style="font-size: 0.75rem; padding: 6px 12px;" onclick="updateStatus(${app.application_id}, 'accepted')">Accept</button>
                                            <button class="glass-btn" style="font-size: 0.75rem; padding: 6px 12px; background: rgba(248, 113, 113, 0.1); color: #f87171; border-color: rgba(248, 113, 113, 0.3);" onclick="updateStatus(${app.application_id}, 'rejected')">Reject</button>
                                        </div>
                                    ` : '<span style="font-size: 0.8rem; color: var(--text-muted);">Reviewed</span>'}
                                </td>
                            </tr>
                            <tr id="details-row-${app.application_id}" style="display: none;">
                                <td colspan="9" style="padding: 0 12px 16px 12px;">
                                    <div style="background: rgba(255,255,255,0.03); border-radius: 8px; padding: 12px;">
                                        <strong style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Interest Statement:</strong>
                                        <p style="margin: 8px 0 0 0; font-size: 0.9rem;">${escapeHtml(app.interest_statement || 'No statement provided.')}</p>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    async function updateStatus(applicationId, newStatus) {
        const res = await fetch(`/faculty/applications/${applicationId}/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
            alert(data.error || 'Failed to update status');
            return;
        }
        
        // Update UI
        const statusCell = document.getElementById(`status-${applicationId}`);
        statusCell.innerHTML = `<span class="status-badge ${newStatus}">${newStatus}</span>`;
        
        // Remove action buttons
        const row = document.getElementById(`app-row-${applicationId}`);
        const actionsCell = row.querySelector('td:last-child');
        actionsCell.innerHTML = '<span style="font-size: 0.8rem; color: var(--text-muted);">Reviewed</span>';
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
{% endblock %}
