<div class="app-navbar">
    <div style="font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; display: flex; align-items: center; gap: 8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Skill Gap Radar <span style="opacity:0.3">/</span> <span class="text-accent">{{ session.name }}</span>
    </div>
    
    <div style="display: flex; gap: 24px; align-items: center;">
        <a href="/messages" class="text-muted" style="position: relative;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span style="position: absolute; top: -4px; right: -4px; width: 8px; height: 8px; background: var(--accent); border-radius: 50%;"></span>
        </a>
        <div style="height: 32px; width: 32px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem;">
            {{ session.name[:1].upper() }}
        </div>
    </div>
</div>
